<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMA Graph Exploration Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://d3js.org/d3.v7.min.js" defer></script>
    <script type="module" src="js/main.js" defer></script>
</head>
<body>
    <aside id="sidebar">
        <h2>DMA Simulator</h2>

        <div class="toggle-container" id="pebble-toggle-bg">
            <input type="checkbox" id="pebbles-toggle">
            <label for="pebbles-toggle">Enable Pebbles</label>
        </div>

        <div class="button-row">
            <button id="btn-step">Next Step</button>
            <button id="btn-play">Auto-Play</button>
        </div>
        <div class="button-row">
            <button id="btn-pause" disabled>Pause</button>
            <button id="btn-reset" class="btn-secondary">Reset</button>
        </div>

        <section class="dashboard-panel">
            <h3>Live Status</h3>
            <div class="dashboard-item">Current Node: <span class="dashboard-value" id="disp-node">-</span></div>
            <div class="dashboard-item">Entry Port: <span class="dashboard-value" id="disp-entry">-</span></div>
            <div class="dashboard-item">Node Status: <span class="dashboard-value" id="disp-status">-</span></div>
            <div class="dashboard-item">Action: <span class="dashboard-value" id="disp-action">-</span></div>
            <div class="dashboard-item">Exit Port: <span class="dashboard-value" id="disp-exit">-</span></div>
        </section>

        <p class="legend">
            <strong>Basic Walk:</strong><br>
            Without pebbles: DMA exits via (Entry Port + 1) mod Degree.<br>
            With pebbles: Backtracks on empty nodes, normal walk on full nodes.
        </p>
    </aside>

    <main id="visualization"></main>
</body>
</html>
